{% extends "base.html" %}

{% block content %}
<h1>{{ category.title }}</h1>

{% for post in post_list %}
  <article>
    <h2>{{ post.title }}</h2>
    <p>{{ post.text }}</p>

    <p>
      Категория:
      <a href="{% url 'blog:category_posts' post.category.slug %}">
        {{ post.category.title }}
      </a>
    </p>

    <p>
      Место: {{ post.location.name }}
    </p>

    <p>
      Дата: {{ post.pub_date }}
    </p>
  </article>
{% endfor %}

{% endblock %}
